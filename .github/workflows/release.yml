name: Release Lua

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare release
        run: npm run prepare:release

      - name: Commit version bumps and manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to commit."
          else
            git add .
            git commit -m "chore(release): auto bump + manifests"
            git push
          fi

      - name: Publish lua branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf .publish
          mkdir -p .publish

          cp -r luas/. .publish/
          cp -r manifests .publish/manifests

          git switch --orphan lua-temp
          git rm -rf . || true

          cp -r .publish/. .
          rm -rf .publish

          cat > README.md <<'EOF'
          # EmberCore Lua Runtime

          This branch is auto-generated from main.
          It contains only Lua runtime files and manifests.
          EOF

          touch .nojekyll

          git add .
          git commit -m "chore(lua): publish runtime from ${GITHUB_SHA}" || echo "Nothing to commit"
          git push origin HEAD:lua --force