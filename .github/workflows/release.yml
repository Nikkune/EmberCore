name: Release Lua

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare release
        run: npm run prepare:release

      - name: Commit version bumps and manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "No changes to commit."
          else
            git add .
            git commit -m "chore(release): auto bump + manifests"
            git push
          fi

      - name: Publish lua branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          rm -rf .publish-worktree .publish
          mkdir -p .publish
          
          cp -r luas/. .publish/
          cp -r manifests .publish/manifests
          
          cat > .publish/README.md <<'EOF'
          # EmberCore Lua Runtime
          
          This branch is auto-generated from main.
          It contains only Lua runtime files and manifests.
          EOF
          
          touch .publish/.nojekyll
          
          # Prépare une worktree dédiée sur la branche lua
          if git ls-remote --exit-code --heads origin lua; then
            git worktree add .publish-worktree origin/lua
          else
            git worktree add --detach .publish-worktree
            cd .publish-worktree
            git checkout --orphan lua
            cd ..
          fi
          
          # Nettoie totalement la worktree
          find .publish-worktree -mindepth 1 -maxdepth 1 \
            ! -name ".git" \
            -exec rm -rf {} +
          
          # Copie uniquement le runtime voulu
          cp -r .publish/. .publish-worktree/
          
          cd .publish-worktree
          git add .
          git commit -m "chore(lua): publish runtime from ${GITHUB_SHA}" || echo "Nothing to commit"
          git push origin HEAD:lua --force
          cd ..
          
          git worktree remove .publish-worktree --force
          rm -rf .publish
